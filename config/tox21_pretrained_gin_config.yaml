model:
  name: "GNNPretrainedPredictor"
  strategy: "masking"          # masking | contextpred | infomax | edgepred
  emb_dim: 300                 # must be 300 to match pretrained weights
  num_layers: 5                # must be 5 to match pretrained weights
  jk: "last"
  drop_ratio: 0.5              # backbone dropout (matches pretrained training)
  head_dropout: 0.1
  num_tasks: 12

training:
  num_epochs: 100
  batch_size: 64
  lr_backbone: 1.0e-4          # small LR to preserve pretrained features
  lr_head: 1.0e-3              # larger LR for the new classification head
  weight_decay: 1.0e-5
  early_stopping_patience: 20
  early_stopping_metric: "mean_auc_roc"
  loss_type: "masked_focal"
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_weighted_sampler: true
  grad_clip: 1.0

data:
  cache_dir: "data"
  pretrained_cache: "data/pretrained_gnns"
  split_type: "scaffold"
  seed: 42

output:
  model_dir: "models/tox21_pretrained_gin_model"
