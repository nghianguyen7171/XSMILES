model:
  name: "PretrainedMolPredictor"
  pretrained_model: "DeepChem/ChemBERTa-77M-MTR"
  dropout: 0.1
  num_tasks: 12

training:
  num_epochs: 60
  batch_size: 32
  learning_rate: 2.0e-5
  uncertainty_lr: 1.0e-3    # separate (higher) LR for log_var task weights
  weight_decay: 0.01
  warmup_ratio: 0.1
  early_stopping_patience: 15
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_weighted_sampler: true
  max_length: 128
  grad_clip: 1.0

data:
  cache_dir: "data"
  split_type: "scaffold"
  seed: 42

output:
  model_dir: "models/tox21_chemberta_uncertainty_model"
