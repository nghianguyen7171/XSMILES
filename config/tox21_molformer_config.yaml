model:
  name: "PretrainedMolPredictor"
  pretrained_model: "ibm/MoLFormer-XL-both-10pct"
  dropout: 0.1
  num_tasks: 12

training:
  num_epochs: 50
  batch_size: 32
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  early_stopping_patience: 10
  early_stopping_metric: "mean_auc_roc"
  loss_type: "masked_focal"
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_weighted_sampler: true
  max_length: 202
  grad_clip: 1.0

data:
  cache_dir: "data"
  split_type: "scaffold"
  seed: 42

output:
  model_dir: "models/tox21_molformer_model"
